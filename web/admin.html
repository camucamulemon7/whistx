<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <title>whistx Admin</title>
    <link rel="stylesheet" href="/admin.css?v=20260319a" />
    <script type="module" src="/admin.js?v=20260319a"></script>
  </head>
  <body>
    <div class="admin-app">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">whistx admin</p>
          <h1>管理者画面</h1>
          <p class="admin-description">承認待ちユーザーと登録済みユーザーを管理します。</p>
        </div>
        <div class="admin-header-actions">
          <a href="/" class="admin-link-btn">アプリへ戻る</a>
          <button id="adminRefreshBtn" type="button" class="admin-primary-btn">更新</button>
        </div>
      </header>

      <main class="admin-layout">
        <section class="admin-card">
          <div class="admin-card-header">
            <div>
              <p class="admin-section-label">Pending Approval</p>
              <h2>承認待ち</h2>
            </div>
            <span id="pendingCount" class="admin-chip">0</span>
          </div>
          <div id="pendingList" class="admin-list"></div>
        </section>

        <section class="admin-card">
          <div class="admin-card-header">
            <div>
              <p class="admin-section-label">User Directory</p>
              <h2>ユーザー一覧</h2>
            </div>
            <span id="userCount" class="admin-chip">0</span>
          </div>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ユーザー</th>
                  <th>権限</th>
                  <th>状態</th>
                  <th>作成日</th>
                  <th>最終ログイン</th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
