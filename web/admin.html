<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta id="adminThemeColor" name="theme-color" content="#f5f5f7" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("whistx_theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = stored === "light" || stored === "dark" ? stored : (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
          const color = theme === "dark" ? "#0a0a0a" : "#f5f5f7";
          document.getElementById("adminThemeColor")?.setAttribute("content", color);
        } catch {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <title>whistx 管理画面</title>
    <link rel="stylesheet" href="/admin.css?v=20260322b" />
    <script type="module" src="/admin.js?v=20260322b"></script>
  </head>
  <body>
    <div class="admin-app">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">whistx 管理</p>
          <h1>管理画面</h1>
          <p class="admin-description">承認待ちユーザーと登録済みユーザーを、狭い画面でも確認しやすい形で管理します。</p>
        </div>
        <div class="admin-header-actions">
          <a href="/" class="admin-link-btn">アプリへ戻る</a>
          <button id="adminRefreshBtn" type="button" class="admin-primary-btn">更新</button>
        </div>
      </header>

      <p id="adminStatus" class="admin-status" aria-live="polite">読み込み中...</p>

      <main class="admin-layout">
        <section class="admin-card admin-pending-card">
          <details id="pendingPanel" class="admin-pending-shell" open>
            <summary class="admin-card-header admin-card-summary">
              <div>
                <p class="admin-section-label">承認キュー</p>
                <h2>承認待ち</h2>
                <p class="admin-card-description">新規登録されたアカウントを確認して承認します。</p>
              </div>
              <span id="pendingCount" class="admin-chip">0</span>
            </summary>
            <div id="pendingList" class="admin-list"></div>
          </details>
        </section>

        <section class="admin-card">
          <div class="admin-card-header">
            <div>
              <p class="admin-section-label">ユーザー管理</p>
              <h2>ユーザー一覧</h2>
              <p class="admin-card-description">ユーザーの権限、状態、最終ログインを確認できます。</p>
            </div>
            <span id="userCount" class="admin-chip">0</span>
          </div>

          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ユーザー</th>
                  <th>権限</th>
                  <th>状態</th>
                  <th>作成日</th>
                  <th>最終ログイン</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>

          <div id="userCards" class="admin-user-cards"></div>
        </section>
      </main>
    </div>
  </body>
</html>
