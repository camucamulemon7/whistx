name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_SESSION_SECRET: ci-session-secret-abcdefghijklmnopqrstuvwxyz12
  ASR_API_KEY: ci-placeholder-key
  PYTHON_VERSION: "3.12"
  TZ: Asia/Tokyo

jobs:
  quality:
    name: Quality and SQLite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install locked development dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Ruff
        run: ruff check .
      - name: Compile Python
        run: python -m compileall -q server tests
      - name: Unit and integration tests
        run: python -m unittest discover -s tests
      - name: Check JavaScript syntax
        run: find web -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Check shell syntax
        run: git ls-files '*.sh' | xargs bash -n
      - name: Migrate and start with SQLite
        env:
          APP_DB_URL: sqlite:////tmp/whistx-ci.db
        run: |
          alembic upgrade head
          python -m uvicorn server.app:app --host 127.0.0.1 --port 8005 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8005/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  postgres:
    name: PostgreSQL migration and startup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: whistx
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d whistx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: production
      APP_DB_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/whistx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock
      - name: Migrate and start with PostgreSQL
        run: |
          alembic upgrade head
          python -m uvicorn server.app:app --host 127.0.0.1 --port 8005 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8005/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

  container:
    name: Docker build and health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: whistx:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start container and require healthy status
        run: |
          docker run --detach --name whistx-ci \
            --publish 8005:8005 \
            --env APP_SESSION_SECRET \
            --env ASR_API_KEY \
            whistx:ci
          trap 'docker logs whistx-ci; docker rm --force whistx-ci' EXIT
          for attempt in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' whistx-ci)"
            if [ "$status" = healthy ]; then
              exit 0
            fi
            if [ "$status" = unhealthy ]; then
              exit 1
            fi
            sleep 2
          done
          exit 1
